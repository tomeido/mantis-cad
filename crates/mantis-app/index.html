<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>MantisCAD</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link data-trunk rel="rust" href="Cargo.toml" data-bin="mantis-app" data-wasm-opt="z"
          data-wasm-opt-params="--enable-bulk-memory --enable-nontrapping-float-to-int --enable-sign-ext --enable-mutable-globals" />
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #1c1f24;
      }
      canvas#mantis_canvas {
        display: block;
        width: 100%;
        height: 100%;
        outline: none;
      }
      #loading {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        color: #7d9fc4;
        font-family: system-ui, sans-serif;
        font-size: 15px;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <div id="loading">Loading MantisCAD…</div>
    <canvas id="mantis_canvas"></canvas>
  </body>
</html>
